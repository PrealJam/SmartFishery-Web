<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}智慧渔场管理系统{% endblock %}</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --primary-color: #00d4ff;
        --secondary-color: #0066cc;
        --accent-color: #00ff88;
        --dark-bg: #0a0e27;
        --card-bg: #141a3a;
        --border-color: #1e2749;
        --text-primary: #e0e0e0;
        --text-secondary: #a0a0a0;
        --shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        --shadow-lg: 0 16px 48px rgba(0, 0, 0, 0.4);
      }

      html,
      body {
        height: 100%;
        overflow-x: hidden;
      }

      body {
        font-family: "Segoe UI", "Microsoft YaHei", Tahoma, sans-serif;
        background: linear-gradient(135deg, var(--dark-bg) 0%, #0f1535 100%);
        color: var(--text-primary);
        background-attachment: fixed;
      }

      /* 导航栏 */
      .navbar {
        background: linear-gradient(
          90deg,
          var(--secondary-color) 0%,
          var(--primary-color) 100%
        );
        box-shadow: var(--shadow);
        border-bottom: 2px solid var(--primary-color);
        padding: 0.2rem 1rem !important;
        height: 38px;
        display: flex;
        align-items: center;
      }

      .navbar .container-fluid {
        padding: 0 !important;
        height: 100%;
        display: flex;
        align-items: center;
      }

      .navbar-brand {
        font-size: 1rem;
        font-weight: 800;
        color: white !important;
        letter-spacing: 0.5px;
        text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        display: flex;
        align-items: center;
        padding: 0 !important;
        margin: 0 !important;
        line-height: 1;
      }

      .navbar-brand i {
        margin-right: 5px;
        font-size: 1.2rem;
      }

      .navbar-nav {
        margin: 0 !important;
        padding: 0 !important;
      }

      .nav-item {
        display: flex;
        align-items: center;
      }

      .nav-link {
        color: rgba(255, 255, 255, 0.9) !important;
        font-weight: 500;
        transition: all 0.3s ease;
        position: relative;
        padding: 0.2rem 0.6rem !important;
        font-size: 0.85rem;
        line-height: 1;
        display: flex;
        align-items: center;
        height: 100%;
      }

      .nav-link i {
        margin-right: 4px;
      }

      .nav-link:hover {
        color: white !important;
        transform: translateY(-2px);
      }

      /* 主容器 */
      .container-fluid {
        display: flex;
        height: calc(100vh - 38px);
      }

      /* 侧边栏 */
      .sidebar {
        width: 250px;
        background: linear-gradient(
          180deg,
          var(--card-bg) 0%,
          var(--dark-bg) 100%
        );
        border-right: 2px solid var(--border-color);
        overflow-y: auto;
        padding: 12px 0;
        box-shadow: var(--shadow);
        height: calc(100vh - 38px);
        position: sticky;
        top: 38px;
      }

      .sidebar .nav-link {
        color: var(--text-secondary);
        padding: 8px 15px;
        margin: 3px 0;
        border-left: 3px solid transparent;
        transition: all 0.3s ease;
        font-size: 0.9rem;
      }

      .sidebar .nav-link i {
        width: 20px;
        margin-right: 12px;
        text-align: center;
      }

      .sidebar .nav-link:hover {
        background-color: rgba(0, 212, 255, 0.1);
        color: var(--primary-color);
        border-left-color: var(--primary-color);
        transform: translateX(5px);
      }

      .sidebar .nav-link.active {
        background: linear-gradient(
          90deg,
          rgba(0, 212, 255, 0.2) 0%,
          rgba(0, 102, 204, 0.1) 100%
        );
        color: var(--primary-color);
        border-left-color: var(--accent-color);
        font-weight: 600;
      }

      /* 主内容区 */
      .content {
        flex: 1;
        overflow-y: auto;
        padding: 30px;
      }

      /* 页面头部 */
      .page-header {
        margin-bottom: 30px;
        padding-bottom: 20px;
        border-bottom: 2px solid var(--border-color);
      }

      .page-header h1 {
        font-size: 2.5rem;
        font-weight: 700;
        background: linear-gradient(
          90deg,
          var(--primary-color),
          var(--accent-color)
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        display: flex;
        align-items: center;
      }

      .page-header h1 i {
        margin-right: 15px;
        color: var(--primary-color);
        -webkit-text-fill-color: var(--primary-color);
      }

      .page-header p {
        color: var(--text-secondary);
        font-size: 0.95rem;
      }

      /* 卡片样式 */
      .card {
        background: linear-gradient(135deg, var(--card-bg) 0%, #0a1a3a 100%);
        border: 2px solid var(--border-color);
        border-radius: 12px;
        box-shadow: var(--shadow);
        transition: all 0.3s ease;
        overflow: hidden;
        margin-bottom: 20px;
      }

      .card:hover {
        border-color: var(--primary-color);
        box-shadow: 0 12px 40px rgba(0, 212, 255, 0.2);
        transform: translateY(-5px);
      }

      .card-header {
        background: linear-gradient(
          90deg,
          var(--secondary-color),
          var(--primary-color)
        );
        border: none;
        padding: 15px 20px;
        border-bottom: 2px solid var(--border-color);
      }

      .card-header h5 {
        color: white;
        margin: 0;
        font-weight: 600;
      }

      .card-body {
        padding: 20px;
        color: var(--text-primary);
      }

      /* 统计卡片 */
      .stat-card {
        background: linear-gradient(
          135deg,
          var(--card-bg) 0%,
          rgba(0, 102, 204, 0.1) 100%
        );
        border: 2px solid var(--border-color);
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 20px;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
      }

      .stat-card::before {
        content: "";
        position: absolute;
        top: -50%;
        right: -50%;
        width: 200px;
        height: 200px;
        background: radial-gradient(
          circle,
          rgba(0, 212, 255, 0.1) 0%,
          transparent 70%
        );
        border-radius: 50%;
        pointer-events: none;
      }

      .stat-card:hover {
        border-color: var(--primary-color);
        box-shadow: var(--shadow-lg);
        transform: translateY(-5px);
      }

      .stat-card .stat-value {
        font-size: 2.5rem;
        font-weight: 800;
        background: linear-gradient(
          90deg,
          var(--primary-color),
          var(--accent-color)
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 5px;
      }

      .stat-card .stat-label {
        color: var(--text-secondary);
        font-size: 0.9rem;
        font-weight: 500;
      }

      .stat-card .stat-icon {
        font-size: 2rem;
        color: var(--primary-color);
        opacity: 0.3;
        float: right;
      }

      /* 按钮样式 */
      .btn-primary {
        background: linear-gradient(
          90deg,
          var(--secondary-color),
          var(--primary-color)
        );
        border: none;
        border-radius: 8px;
        color: white;
        font-weight: 600;
        padding: 10px 20px;
        transition: all 0.3s ease;
        box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3);
      }

      .btn-primary:hover {
        box-shadow: 0 8px 25px rgba(0, 212, 255, 0.4);
        transform: translateY(-2px);
        color: white;
      }

      .btn-primary:active {
        transform: translateY(0);
      }

      .btn-secondary {
        background: var(--card-bg);
        border: 2px solid var(--border-color);
        color: var(--primary-color);
        border-radius: 8px;
        font-weight: 600;
        padding: 10px 20px;
        transition: all 0.3s ease;
      }

      .btn-secondary:hover {
        border-color: var(--primary-color);
        background: rgba(0, 212, 255, 0.1);
        color: var(--primary-color);
      }

      .btn-sm {
        padding: 6px 12px;
        font-size: 0.85rem;
      }

      /* 表格样式 */
      .table {
        color: var(--text-primary);
      }

      .table thead th {
        border-bottom: 2px solid var(--border-color);
        color: var(--primary-color);
        font-weight: 600;
        background: rgba(0, 102, 204, 0.1);
        padding: 15px;
      }

      .table tbody td {
        border-bottom: 1px solid var(--border-color);
        padding: 12px 15px;
        vertical-align: middle;
      }

      .table tbody tr:hover {
        background: rgba(0, 212, 255, 0.05);
        cursor: pointer;
      }

      /* 状态徽章 */
      .badge {
        padding: 6px 12px;
        border-radius: 20px;
        font-weight: 600;
        font-size: 0.85rem;
      }

      .badge-success {
        background: linear-gradient(90deg, #00ff88, #00ccff);
        color: var(--dark-bg);
      }

      .badge-danger {
        background: linear-gradient(90deg, #ff4444, #ff0000);
        color: white;
      }

      .badge-warning {
        background: linear-gradient(90deg, #ffaa00, #ff6600);
        color: white;
      }

      .badge-info {
        background: linear-gradient(
          90deg,
          var(--secondary-color),
          var(--primary-color)
        );
        color: white;
      }

      /* 图表容器 */
      .chart-container {
        background: var(--card-bg);
        border: 2px solid var(--border-color);
        border-radius: 12px;
        padding: 20px;
        height: 400px;
        margin-bottom: 20px;
        box-shadow: var(--shadow);
      }

      /* 响应式调整 */
      @media (max-width: 768px) {
        .sidebar {
          width: 200px;
        }

        .page-header h1 {
          font-size: 1.8rem;
        }

        .stat-card .stat-value {
          font-size: 2rem;
        }

        .container-fluid {
          flex-direction: column;
        }

        .sidebar {
          height: auto;
          width: 100%;
          border-right: none;
          border-bottom: 2px solid var(--border-color);
        }
      }

      /* 滚动条美化 */
      ::-webkit-scrollbar {
        width: 8px;
      }

      ::-webkit-scrollbar-track {
        background: var(--dark-bg);
      }

      ::-webkit-scrollbar-thumb {
        background: var(--primary-color);
        border-radius: 4px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: var(--accent-color);
      }

      /* 加载动画 */
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }

      .pulse {
        animation: pulse 2s ease-in-out infinite;
      }

      /* 刷新按钮 */
      .refresh-btn {
        background: linear-gradient(
          90deg,
          var(--secondary-color),
          var(--primary-color)
        );
        border: none;
        color: white;
        padding: 8px 15px;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 600;
        font-size: 0.85rem;
        transition: all 0.3s ease;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        box-shadow: 0 4px 15px rgba(0, 212, 255, 0.2);
      }

      .refresh-btn:hover {
        box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3);
        transform: translateY(-2px);
        color: white;
        text-decoration: none;
      }

      .refresh-btn.loading {
        opacity: 0.7;
        pointer-events: none;
      }

      .refresh-btn i {
        transition: transform 0.3s ease;
      }

      .refresh-btn.loading i {
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      /* 时间戳显示 */
      .data-timestamp {
        font-size: 0.8rem;
        color: var(--text-secondary);
        margin-top: 5px;
        display: inline-block;
      }

      /* 没有数据提示 */
      .empty-state {
        text-align: center;
        padding: 60px 40px;
        color: var(--text-secondary);
        background: linear-gradient(135deg, var(--card-bg) 0%, #0a1a3a 100%);
        border: 2px solid var(--border-color);
        border-radius: 12px;
        margin: 20px 0;
      }

      .empty-state i {
        font-size: 3rem;
        opacity: 0.3;
        margin-bottom: 15px;
        display: block;
      }

      .empty-state p {
        margin: 0;
      }

      /* 加载提示 */
      .spinner-border {
        border-color: rgba(0, 212, 255, 0.2);
        border-right-color: var(--primary-color);
      }

      /* 成功/错误提示 */
      .alert-success {
        background: rgba(0, 255, 136, 0.1);
        border: 2px solid var(--accent-color);
        color: var(--accent-color);
      }

      .alert-danger {
        background: rgba(255, 68, 68, 0.1);
        border: 2px solid #ff4444;
        color: #ff8888;
      }

      .alert-info {
        background: rgba(0, 212, 255, 0.1);
        border: 2px solid var(--primary-color);
        color: var(--primary-color);
      }

      /* 输入框样式 */
      .form-control {
        background: rgba(0, 0, 0, 0.3);
        border: 2px solid var(--border-color);
        color: var(--text-primary);
        border-radius: 8px;
        padding: 10px 15px;
        transition: all 0.3s ease;
      }

      .form-control:focus {
        background: rgba(0, 0, 0, 0.5);
        border-color: var(--primary-color);
        color: var(--text-primary);
        box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
      }

      .form-control::placeholder {
        color: var(--text-secondary);
      }

      /* 标签样式 */
      .form-label {
        color: var(--text-primary);
        font-weight: 500;
        margin-bottom: 8px;
      }

      /* 告警样式 */
      .alert {
        border-radius: 8px;
        border: 2px solid;
        padding: 15px;
        margin-bottom: 20px;
      }

      .alert-danger {
        background: rgba(255, 68, 68, 0.1);
        border-color: #ff4444;
        color: #ff8888;
      }

      .alert-warning {
        background: rgba(255, 170, 0, 0.1);
        border-color: #ffaa00;
        color: #ffcc00;
      }

      .alert-success {
        background: rgba(0, 255, 136, 0.1);
        border-color: #00ff88;
        color: #00ff88;
      }

      .alert-info {
        background: rgba(0, 212, 255, 0.1);
        border-color: var(--primary-color);
        color: var(--primary-color);
      }
    </style>
    {% block extra_css %}{% endblock %}
  </head>
  <body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="/">
          <i class="fas fa-wave-square"></i>
          Smart Fishery Pro
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-toggle="collapse"
          data-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ml-auto">
            <li class="nav-item">
              <a class="nav-link" href="/"
                ><i class="fas fa-user-circle"></i> 用户</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#"><i class="fas fa-bell"></i> 告警</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#"><i class="fas fa-cog"></i> 设置</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- 主容器 -->
    <div class="container-fluid">
      <!-- 侧边栏 -->
      <div class="sidebar">
        <div class="nav flex-column">
          <a
            class="nav-link {% if request.endpoint == 'index' %}active{% endif %}"
            href="/"
          >
            <i class="fas fa-chart-line"></i> 仪表板
          </a>
          <a
            class="nav-link {% if request.endpoint == 'ponds_page' %}active{% endif %}"
            href="/ponds"
          >
            <i class="fas fa-water"></i> 鱼池管理
          </a>
          <a
            class="nav-link {% if request.endpoint == 'water_quality_page' %}active{% endif %}"
            href="/water-quality"
          >
            <i class="fas fa-flask"></i> 水质监测
          </a>
          <a
            class="nav-link {% if request.endpoint == 'devices_page' %}active{% endif %}"
            href="/devices"
          >
            <i class="fas fa-cogs"></i> 设备管理
          </a>
          <hr style="border-color: var(--border-color); margin: 10px 0" />
          <a class="nav-link" href="#">
            <i class="fas fa-help-circle"></i> 帮助
          </a>
          <a class="nav-link" href="#">
            <i class="fas fa-file-alt"></i> 文档
          </a>
        </div>
      </div>

      <!-- 主内容区 -->
      <div class="content">{% block content %}{% endblock %}</div>
    </div>

    <!-- 脚本 -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.0/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <script src="/static/js/main.js"></script>
    {% block extra_js %}{% endblock %}
  </body>
</html>
