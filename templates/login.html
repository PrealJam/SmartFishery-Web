<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>登录 - 智慧渔场管理系统</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --primary-color: #00d4ff;
        --secondary-color: #0066cc;
        --dark-bg: #0a0e27;
        --card-bg: #141a3a;
        --border-color: #1e2749;
        --text-primary: #e0e0e0;
        --text-secondary: #a0a0a0;
      }

      body {
        font-family: "Segoe UI", "Microsoft YaHei", Tahoma, sans-serif;
        background: linear-gradient(135deg, var(--dark-bg) 0%, #0f1535 100%);
        color: var(--text-primary);
        background-attachment: fixed;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }

      .login-container {
        width: 100%;
        max-width: 400px;
        padding: 20px;
      }

      .login-card {
        background: linear-gradient(135deg, var(--card-bg) 0%, #0a1a3a 100%);
        border: 2px solid var(--border-color);
        border-radius: 12px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        padding: 40px;
      }

      .login-header {
        text-align: center;
        margin-bottom: 40px;
      }

      .login-header i {
        font-size: 3rem;
        background: linear-gradient(
          90deg,
          var(--primary-color),
          var(--secondary-color)
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 15px;
      }

      .login-header h1 {
        font-size: 1.8rem;
        font-weight: 700;
        background: linear-gradient(
          90deg,
          var(--primary-color),
          var(--secondary-color)
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 10px;
      }

      .login-header p {
        color: var(--text-secondary);
        font-size: 0.9rem;
      }

      .form-group label {
        color: var(--text-primary);
        font-weight: 600;
        margin-bottom: 10px;
      }

      .form-control {
        background: rgba(0, 0, 0, 0.2);
        border: 2px solid var(--border-color);
        color: var(--text-primary);
        padding: 12px 15px;
        border-radius: 8px;
        transition: all 0.3s ease;
      }

      .form-control:focus {
        background: rgba(0, 0, 0, 0.3);
        border-color: var(--primary-color);
        color: var(--text-primary);
        box-shadow: 0 0 0 0.2rem rgba(0, 212, 255, 0.25);
      }

      .form-control::placeholder {
        color: var(--text-secondary);
      }

      .btn-login {
        width: 100%;
        padding: 12px;
        background: linear-gradient(
          90deg,
          var(--secondary-color),
          var(--primary-color)
        );
        border: none;
        border-radius: 8px;
        color: white;
        font-weight: 600;
        font-size: 1rem;
        margin-top: 20px;
        transition: all 0.3s ease;
        cursor: pointer;
      }

      .btn-login:hover {
        box-shadow: 0 8px 24px rgba(0, 212, 255, 0.3);
        transform: translateY(-2px);
      }

      .alert {
        background: rgba(255, 68, 68, 0.1);
        border: 2px solid #ff4444;
        color: #ff8888;
        border-radius: 8px;
        margin-bottom: 20px;
        padding: 12px 15px;
      }

      .demo-info {
        background: rgba(0, 212, 255, 0.1);
        border: 2px solid var(--border-color);
        border-radius: 8px;
        padding: 15px;
        margin-top: 20px;
        font-size: 0.85rem;
        color: var(--text-secondary);
      }

      .demo-info strong {
        color: var(--primary-color);
      }

      /* 身份选择样式 */
      .identity-section {
        margin-bottom: 30px;
        padding-bottom: 20px;
        border-bottom: 2px solid var(--border-color);
      }

      .identity-label {
        color: var(--text-primary);
        font-weight: 600;
        display: block;
        margin-bottom: 12px;
        font-size: 0.95rem;
      }

      .identity-options {
        display: flex;
        gap: 15px;
      }

      .identity-radio {
        flex: 1;
      }

      .identity-radio input[type="radio"] {
        display: none;
      }

      .identity-radio label {
        display: block;
        padding: 12px 15px;
        border: 2px solid var(--border-color);
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.2);
        cursor: pointer;
        transition: all 0.3s ease;
        text-align: center;
        margin: 0;
        color: var(--text-secondary);
        font-weight: 500;
      }

      .identity-radio input[type="radio"]:checked + label {
        border-color: var(--primary-color);
        background: rgba(0, 212, 255, 0.1);
        color: var(--primary-color);
        box-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
      }

      .identity-radio label:hover {
        border-color: var(--primary-color);
        transform: translateY(-2px);
      }

      .identity-radio i {
        display: block;
        font-size: 1.5rem;
        margin-bottom: 5px;
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <div class="login-card">
        <div class="login-header">
          <i class="fas fa-water"></i>
          <h1>智慧渔场</h1>
          <p>管理系统登录</p>
        </div>

        {% if error %}
        <div class="alert" role="alert">
          <i class="fas fa-exclamation-circle mr-2"></i>{{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/login">
          <!-- 身份选择部分 -->
          <div class="identity-section">
            <span class="identity-label">
              <i class="fas fa-id-card mr-2"></i>选择您的身份
            </span>
            <div class="identity-options">
              <div class="identity-radio">
                <input
                  type="radio"
                  id="identity_admin"
                  name="identity"
                  value="admin"
                  checked
                />
                <label for="identity_admin">
                  <i class="fas fa-crown"></i>
                  <div>渔场管理员</div>
                </label>
              </div>
              <div class="identity-radio">
                <input
                  type="radio"
                  id="identity_supplier"
                  name="identity"
                  value="supplier"
                />
                <label for="identity_supplier">
                  <i class="fas fa-fish"></i>
                  <div>鱼苗供应商</div>
                </label>
              </div>
            </div>
          </div>

          <div class="form-group">
            <label for="username">
              <i class="fas fa-user mr-2"></i>用户名
            </label>
            <input
              type="text"
              class="form-control"
              id="username"
              name="username"
              placeholder="请输入用户名"
              required
              autofocus
            />
          </div>

          <div class="form-group">
            <label for="password"> <i class="fas fa-lock mr-2"></i>密码 </label>
            <input
              type="password"
              class="form-control"
              id="password"
              name="password"
              placeholder="请输入密码"
              required
            />
          </div>

          <button type="submit" class="btn-login">
            <i class="fas fa-sign-in-alt mr-2"></i>登录
          </button>
        </form>

        <div class="demo-info">
          <strong>📋 演示账号：</strong><br />
          <strong>管理员:</strong> admin / admin123<br />
          <strong>商家1:</strong> supplier1 / supplier123<br />
          <strong>商家2:</strong> supplier2 / supplier123
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
