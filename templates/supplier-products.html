{% extends "base.html" %} {% block title %}产品管理 - 商家系统{% endblock %} {%
block content %}
<div class="page-header">
  <h1><i class="fas fa-box"></i> 产品管理</h1>
  <button
    class="btn btn-primary"
    data-toggle="modal"
    data-target="#addProductModal"
  >
    <i class="fas fa-plus"></i> 添加产品
  </button>
</div>

<div class="card">
  <div class="card-body">
    <div class="table-responsive">
      <table class="table table-striped" id="productsTable">
        <thead>
          <tr>
            <th>产品名称</th>
            <th>物种</th>
            <th>等级</th>
            <th>单价</th>
            <th>库存</th>
            <th>状态</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td colspan="7" class="text-center">加载中...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- 添加产品模态框 -->
<div class="modal fade" id="addProductModal">
  <div class="modal-dialog modal-lg">
    <div class="modal-content bg-dark">
      <div
        class="modal-header border-bottom"
        style="border-color: var(--border-color)"
      >
        <h5 class="modal-title">添加产品</h5>
        <button type="button" class="close text-white" data-dismiss="modal">
          &times;
        </button>
      </div>
      <form id="addProductForm">
        <div class="modal-body">
          <div class="form-group">
            <label>产品名称*</label>
            <input
              type="text"
              class="form-control"
              name="product_name"
              required
            />
          </div>
          <div class="form-row">
            <div class="form-group col-md-6">
              <label>物种*</label>
              <select class="form-control" name="species" required>
                <option value="">--请选择--</option>
                <option value="草鱼">草鱼</option>
                <option value="鲈鱼">鲈鱼</option>
                <option value="鲤鱼">鲤鱼</option>
                <option value="鲶鱼">鲶鱼</option>
              </select>
            </div>
            <div class="form-group col-md-6">
              <label>等级</label>
              <input
                type="text"
                class="form-control"
                name="grade"
                placeholder="如：一龄、寸苗"
              />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group col-md-6">
              <label>单价(元/尾)*</label>
              <input
                type="number"
                class="form-control"
                name="unit_price"
                step="0.01"
                required
              />
            </div>
            <div class="form-group col-md-6">
              <label>成本价(元/尾)</label>
              <input
                type="number"
                class="form-control"
                name="cost_price"
                step="0.01"
              />
            </div>
          </div>
          <div class="form-group">
            <label>初始库存(尾)</label>
            <input
              type="number"
              class="form-control"
              name="initial_quantity"
              min="0"
            />
          </div>
          <div class="form-group">
            <label>描述</label>
            <textarea
              class="form-control"
              name="description"
              rows="3"
            ></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-dismiss="modal">
            取消
          </button>
          <button type="submit" class="btn btn-primary">创建</button>
        </div>
      </form>
    </div>
  </div>
</div>

<style>
  .page-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 30px;
    padding-bottom: 20px;
    border-bottom: 2px solid var(--border-color);
  }

  .card {
    background: linear-gradient(135deg, var(--card-bg) 0%, #0a1a3a 100%);
    border: 2px solid var(--border-color);
    border-radius: 12px;
  }
</style>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    loadProducts();
    document
      .getElementById("addProductForm")
      .addEventListener("submit", handleAddProduct);
  });

  function loadProducts() {
    apiCall("/my-products?page=1&per_page=20", "GET", null, {
      successCallback: function (response) {
        if (response.status === "success") {
          const tbody = document.querySelector("#productsTable tbody");
          tbody.innerHTML = "";

          if (response.data.length === 0) {
            tbody.innerHTML =
              '<tr><td colspan="7" class="text-center">暂无产品</td></tr>';
            return;
          }

          response.data.forEach((product) => {
            const row = `
            <tr>
              <td>${product.product_name}</td>
              <td>${product.species}</td>
              <td>${product.grade || "-"}</td>
              <td>¥${product.unit_price.toFixed(2)}</td>
              <td><span class="badge badge-info">${product.inventory}</span></td>
              <td><span class="badge badge-success">${product.is_active ? "上架" : "下架"}</span></td>
              <td>
                <button class="btn btn-sm btn-warning" onclick="editInventory(${product.id})">库存</button>
              </td>
            </tr>
          `;
            tbody.innerHTML += row;
          });
        }
      },
    });
  }

  function handleAddProduct(e) {
    e.preventDefault();
    const formData = new FormData(document.getElementById("addProductForm"));
    const data = Object.fromEntries(formData);

    apiCall("/my-products/add", "POST", data, {
      successCallback: function () {
        showNotification("产品创建成功", "success");
        document.getElementById("addProductForm").reset();
        document.getElementById("addProductModal").modal("hide");
        loadProducts();
      },
    });
  }

  function editInventory(productId) {
    const quantity = prompt("请输入新库存数量:");
    if (quantity !== null) {
      apiCall(
        `/my-products/${productId}/inventory`,
        "PUT",
        { quantity: parseInt(quantity) },
        {
          successCallback: function () {
            showNotification("库存更新成功", "success");
            loadProducts();
          },
        },
      );
    }
  }
</script>
{% endblock %}
